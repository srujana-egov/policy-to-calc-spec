    CalculationRecord:
      type: object
      description: Immutable audit snapshot of a confirmed calculation, shaped for direct forwarding to a billing service.
      properties:
        calculationId:
          type: string
          format: uuid
          description: The UUID of this calculation, unchanged from the original estimate call.
          example: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
        entityId:
          type: string
          readOnly: true
          description: The entityId this calculation was performed for, snapshotted from /estimate.
          example: b3a12c84-1234-4321-a9fc-2b983e55bca3
        module:
          type: string
          readOnly: true
          description: The module this calculation was performed under.
          example: trade-license
        status:
          type: string
          enum:
          - CONFIRMED
          description: Always CONFIRMED for a record returned by this endpoint; CANCELLED after a successful cancel.
          example: CONFIRMED
        entityDetailSnapshot:
          type: object
          additionalProperties: true
          description: The exact entityDetail payload used at confirmation time.
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          description: The full, ordered breakup of every computed component, frozen at confirmation time.
          example:
          - component: STAFFING_FEE
            ruleType: RATE_MATRIX
            subEntityIndex: null
            ruleId: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
            configVersion: 1
            resolvedJsonPath: $.certificateDetail.employeeCount
            amount: 1200
            description: employeeCount band 10-24 → flat 1200
          - component: CGST
            ruleType: TAX
            subEntityIndex: null
            ruleId: c3d4e5f6-3333-4444-5555-666677778888
            configVersion: 1
            resolvedJsonPath: null
            amount: 108
            description: 9% of STAFFING_FEE (1200)
        totalAmount:
          type: number
          description: Final payable amount, locked in at confirmation and never recomputed.
          example: 1478
        confirmedAt:
          type: string
          format: date-time
          description: Server timestamp when this record was confirmed.
          example: '2026-07-03T10:20:00Z'
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'
      x-businessRules:
      - A CalculationRecord is immutable once created — its lineItems, configVersion snapshots, and totalAmount never change, even if the underlying rules are later edited. Recomputing for the same entity requires a new estimate.
      - entityDetailSnapshot preserves the exact payload used, so an old record can always be re-derived and audited even after the caller's own domain object shape has since changed.
