                    message: Missing or invalid bearer token.
        '404':
          description: Not Found — calculationId does not exist.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                  - code: Calculation.NotFound
                    message: No calculation found with the given calculationId.
        '409':
          description: Conflict — calculation has already been confirmed or cancelled.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                alreadyCancelled:
                  value:
                  - code: Calculation.AlreadyCancelled
                    message: This calculation has already been cancelled.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred.
  /{module}/cancel:
    post:
      summary: Cancel a calculation
      operationId: cancelCalculation
      tags:
      - Calculation
      description: 'Marks a calculation — confirmed or unconfirmed — as cancelled/void.


        **Idempotent** — returns `200` even if the calculation was already cancelled.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/ModulePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
            example:
              calculationId: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
              reason: Duplicate demand raised in error
      responses:
        '200':
          description: Calculation cancelled or was already inactive.
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Tenant-ID:
              $ref: '#/components/headers/X-Tenant-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'
              examples:
                cancelled:
                  summary: Calculation cancelled
                  value:
                    cancelled: true
                    calculationId: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
        '400':
          description: Bad Request — missing or malformed fields. Also returned as `Module.Mismatch` when the `module` in the path does not match the module the referenced `calculationId` was originally created under.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                moduleMismatch:
                  summary: Path module does not match the calculation’s module
                  value:
                  - code: Module.Mismatch
                    message: calculationId '8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3' was created under module 'trade-license', not the module in this request path.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred.
components:
  securitySchemes:
    BearerAuth:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/securitySchemes/BearerAuth
  parameters:
    RequestIdHeader:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/RequestIdHeader
    CorrelationIdHeader:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/CorrelationIdHeader
    UserAgentHeader:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/UserAgentHeader
    TenantIdHeader:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/TenantIdHeader
    ForwardedForHeader:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/ForwardedForHeader
    ClientId:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/ClientId
    ClientSecret:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/ClientSecret
    TimeStamp:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/parameters/TimeStamp
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 'Provide a unique value to prevent duplicate operations on retries.

        For `/estimate` and `/confirm`: replaying the same key returns the original response instead of creating a duplicate calculation/record.

        '
      schema:
        type: string
        minLength: 8
        maxLength: 128
    ModulePath:
      name: module
      in: path
      required: true
      description: The government module this request applies to, e.g. trade-license, driving-license, property-tax. Free-form (not an enum) so new modules can be onboarded without a spec change. For calculation lifecycle endpoints (estimate/recalculate/confirm/cancel), this must match the module the calculationId was originally created under, or the request is rejected with 400 Module.Mismatch.
      schema:
        type: string
        minLength: 1
        maxLength: 64
    RuleIdPath:
      name: id
      in: path
      required: true
      description: The unique identifier of the calculation rule.
      schema:
        type: string
        format: uuid
  headers:
    X-Response-Time:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Response-Time
    X-Response-Timestamp:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Response-Timestamp
    X-Request-ID:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Request-ID
    X-Correlation-ID:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Correlation-ID
    X-Tenant-ID:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Tenant-ID
    X-Rate-Limit:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Rate-Limit
    X-Rate-Limit-Remaining:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Rate-Limit-Remaining
    X-Rate-Limit-Reset:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/headers/X-Rate-Limit-Reset
  schemas:
    Error:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/schemas/Error
    AuditDetail:
      $ref: https://raw.githubusercontent.com/digitnxt/digit-specs/refs/heads/main/v3.0.0/common.yaml#/components/schemas/AuditDetail
    RuleType:
      type: string
      enum:
      - RATE_MATRIX
      - ADJUSTMENT
      - PENALTY
      - INTEREST
      - TAX
      - AGGREGATION
      description: 'The category of calculation rule.

        - **RATE_MATRIX**: Multi-dimensional base rate/slab lookup (e.g. ₹/sqft by zone+floor+size+usage, ₹/unit by accessory type).

        - **ADJUSTMENT**: Rebate or exemption applied on top of a base component (owner-type rebate, age depreciation, bulk-accessory surcharge). Combinable — more than one may apply to the same entity.

        - **PENALTY**: Time-based punitive component, typically dependent on days delayed past a due date.

        - **INTEREST**: Time-based accrual component, typically dependent on principal and days delayed.

        - **TAX**: Statutory tax head applied on a taxable base, e.g. CGST, SGST.

        - **AGGREGATION**: Derives a single entity-level attribute by summing/counting/etc. over a sub-entity array (e.g. total accessory count from individual accessory line quantities), making it available to other rules as if it had been sent directly.

        '
    CalculationType:
      type: string
      enum:
      - FLAT
      - PERCENTAGE
      - PER_UNIT
      - SLAB
      - FORMULA
      description: 'How the rule''s `value` (or `slabs`/`formulaLogic`) is applied.

        - **FLAT**: A fixed amount, added or subtracted as-is.

        - **PERCENTAGE**: `value` is a percentage (e.g. `9` = 9%) of the component referenced by `appliesOn.componentRef`.

        - **PER_UNIT**: `value` is a per-unit rate multiplied by the numeric field referenced by `appliesOn.jsonPath`.

        - **SLAB**: `slabs` defines tiered from/to bands applied against the numeric field referenced by `appliesOn.jsonPath`.

        - **FORMULA**: `formulaLogic` (JSON Logic) is evaluated against the variables declared in `formulaVariables`, plus any component amounts listed in `dependsOn`.

        '
    Scope:
      type: string
      enum:
      - ENTITY
      - SUBENTITY
      description: 'Whether this rule evaluates once against the whole entity payload (`ENTITY`), or once per element of a repeating sub-entity array (`SUBENTITY`, requires `subEntityPath`).

        '
    AttributeCondition:
      type: object
      required:
      - jsonPath
      description: 'A single matching condition, resolved directly against the caller''s raw payload via `jsonPath` — either an exact match or a numeric/date range.

        For `scope: SUBENTITY` rules, `jsonPath` is evaluated relative to each sub-entity element (e.g. `type`), not the document root.

        If this attribute name is already registered for the module with a different `jsonPath`, the rule is rejected with `409 AttributePath.Conflict` — see the registration rule on `CalculationRule`.

        '
      properties:
        jsonPath:
          type: string
          description: JSONPath to this attribute''s value. Root-relative for ENTITY scope (e.g. `$.tradeLicenseDetail.employeeCount`); relative to the current sub-entity element for SUBENTITY scope (e.g. `type`).
          example: $.tradeLicenseDetail.employeeCount
        derivedFrom:
          type: string
          nullable: true
          description: Set instead of expecting a raw payload value — names the AGGREGATION (or other) component code that produced this attribute. When set, jsonPath is not resolved against the raw payload; the value is read from the already-computed derived attribute.
          example: TOTAL_ACCESSORY_COUNT
        equals:
          description: Exact value this attribute must equal for the condition to match. Mutually exclusive with from/to.
          example: WEIGHING_SCALE
        from:
          type: number
          description: Inclusive lower bound of a range match.
          example: 10
        to:
          type: number
          nullable: true
          description: Inclusive upper bound of a range match. Omit or null for unbounded-above.
          example: 24
      x-businessRules:
      - Set jsonPath together with either equals, or from/to, or neither (a rule that only needs the attribute to be present). Setting both equals and from/to on the same condition is rejected — a condition is either an exact match or a range match, never both.
      - derivedFrom, when set, replaces jsonPath resolution entirely — the value is read from an already-computed AGGREGATION result rather than the raw payload, and jsonPath is ignored.
    AttributeBinding:
      type: object
      required:
      - jsonPath
      properties:
        jsonPath:
          type: string
          description: JSONPath to the value bound to this variable name, for use in `formulaLogic`, `appliesOn` (PER_UNIT/SLAB), or `subEntityPath` iteration.
          example: $.tradeLicenseDetail.premises.sizeSqm
        componentRef:
          type: string
          nullable: true
          description: Set instead of jsonPath when this binding refers to another component's already-computed amount rather than a raw payload field (used by PERCENTAGE calculationType and by ADJUSTMENT `appliesOn`).
          example: LICENSE_FEE
      description: Points a variable name or a rule input at a source of truth for its value — either a jsonPath into the raw entityDetail payload, or a componentRef pointing at another component's already-computed amount. Used by formulaVariables, appliesOn, and sourceAttribute wherever a rule needs to say where a number comes from.
      x-businessRules:
      - Exactly one of jsonPath or componentRef should be set on a given binding — jsonPath reads the raw payload, componentRef reads another component's computed amount. Setting neither is a validation error at rule-write time.
    Slab:
      type: object
      required:
      - from
      - rate
      properties:
        from:
          type: number
          description: Inclusive lower bound of this tier.
          example: 0
        to:
          type: number
          nullable: true
          description: Inclusive upper bound of this tier. Omit or null for the final, unbounded tier.
          example: 500000
        rate:
          type: number
          description: Rate applied to the portion of the value within this tier.
          example: 0.5
      description: One tier of a SLAB calculationType rule. from/to define the inclusive band this tier covers over the numeric value at appliesOn.jsonPath; rate is the multiplier applied only to the portion of the value that falls inside this tier — not the whole value.
      x-businessRules:
      - to may be omitted only on the final, highest tier in a rule's slabs array — every other tier must have both from and to.
      - 'Tiers are true slabs, not brackets: a value of 700000 against tiers [0-500000 @ rate 0.5][500000+ @ rate 1] pays rate 0.5 on the first 500000 and rate 1 on the remaining 200000 — not rate 1 applied to the full 700000.'
    CalculationRule:
      type: object
      description: 'A single configurable calculation rule for a module + component under a tenant. Every attribute this rule reads is declared inline via `jsonPath` — there is no separate entity-mapping resource.

        '
      required:
      - ruleType
      - component
      - scope
      - calculationType
      - effectiveFrom
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: System-generated unique identifier (UUID) for this rule record.
          example: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
        module:
          type: string
          minLength: 1
          maxLength: 64
          description: The government module this rule belongs to, e.g. trade-license, driving-license, property-tax. Resolved from the {module} path segment on write; always present on read. Free-form (not an enum) so new modules can be onboarded without a spec change.
          example: trade-license
          readOnly: true
        ruleType:
          $ref: '#/components/schemas/RuleType'
        component:
          type: string
          minLength: 1
          maxLength: 64
          description: The line-item code this rule produces or adjusts, e.g. STAFFING_FEE, ACCESSORY_REGISTRATION_FEE, CGST, PENALTY, BULK_ACCESSORY_SURCHARGE. Referenced by other rules' `dependsOn` and `appliesOn.componentRef` to build the evaluation graph.
          example: STAFFING_FEE
        scope:
          $ref: '#/components/schemas/Scope'
        subEntityPath:
          type: string
          nullable: true
          description: 'Required when `scope = SUBENTITY`. JSONPath to the repeating array this rule iterates, e.g. `$.tradeLicenseDetail.accessories[*]`.

            Any other rule sharing this `component` must resolve to the same path — enforced by the same registration-conflict check as attribute names.

            '
          example: $.tradeLicenseDetail.accessories[*]
        conditions:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeCondition'
          description: Attribute-name to AttributeCondition map this rule matches against. An empty object matches every entity/subEntity for this module.
          example:
            accessoryType:
              jsonPath: type
              equals: WEIGHING_SCALE
        calculationType:
          $ref: '#/components/schemas/CalculationType'
        value:
          type: number
          description: Numeric rate/amount for FLAT, PERCENTAGE, and PER_UNIT. Percentage expressed in points (`9` = 9%). Negative for FLAT deductions (rebates).
          example: 200
        slabs:
          type: array
          items:
            $ref: '#/components/schemas/Slab'
          description: Ordered, non-overlapping tiers, required when calculationType = SLAB.
          example:
          - from: 0
            to: 500000
            rate: 0.5
          - from: 500000
            to: null
            rate: 1
        formulaLogic:
          type: object
          additionalProperties: true
          description: 'JSON Logic (https://jsonlogic.com) expression, required when calculationType = FORMULA. References variable names declared in `formulaVariables` via a var operator, e.g. {"var": "name"}.'
          example:
            +:
            - 200
            - '*':
              - var: sizeOfPremiseSqm
              - 15
        formulaVariables:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeBinding'
          description: Declares, per variable name used in `formulaLogic`, where its value comes from. Required when calculationType = FORMULA.
        appliesOn:
          $ref: '#/components/schemas/AttributeBinding'
          description: For PER_UNIT/SLAB, the numeric field (via jsonPath) the rate multiplies. For PERCENTAGE/ADJUSTMENT, the component (via componentRef) being taxed or adjusted.
        aggregateFunction:
          type: string
          enum:
          - SUM
          - COUNT
          - MAX
          - MIN
          - AVG
          nullable: true
          description: Required when ruleType = AGGREGATION. Function applied over `sourceAttribute` across every element resolved by `subEntityPath`.
          example: SUM
        sourceAttribute:
          $ref: '#/components/schemas/AttributeBinding'
          description: Required when ruleType = AGGREGATION. The per-sub-entity field (relative jsonPath) being aggregated, e.g. `quantity`.
        targetAttribute:
          type: string
          nullable: true
          description: Required when ruleType = AGGREGATION. The canonical attribute name the aggregated result is injected as, e.g. `numberOfAccessories` — becomes referenceable by other rules via `AttributeCondition.derivedFrom`.
          example: numberOfAccessories
        dependsOn:
          type: array
          items:
            type: string
          description: Component codes that must be evaluated before this one (topological ordering), e.g. an ADJUSTMENT that reads a derived attribute lists the AGGREGATION component that produces it.
          example:
          - TOTAL_ACCESSORY_COUNT
        priority:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
          description: Evaluation order hint within the same dependency tier, and the order multiple matching ADJUSTMENT rules apply. Lower values evaluate first.
          example: 10
        roundOff:
          type: string
          enum:
          - NONE
          - NEAREST_1
          - NEAREST_10
          - NEAREST_100
          default: NEAREST_1
          description: Rounding applied to this component's computed amount before it is added to the total.
          example: NEAREST_1
        isActive:
          type: boolean
          default: true
          description: Whether this rule is active. Inactive rules are excluded from `/estimate` matching but retained for audit/history.
          example: true
        effectiveFrom:
          type: string
          format: date
          description: Date from which this rule version is applicable (inclusive).
          example: '2024-04-01'
        effectiveTo:
          type: string
          format: date
          nullable: true
          description: Date until which this rule version is applicable (inclusive). Null means open-ended / currently active.
          example: '2025-03-31'
        version:
          type: integer
          format: int32
          minimum: 1
          readOnly: true
          description: Server-managed counter incremented on every PUT. Used for optimistic concurrency.
          example: 1
        configVersion:
          type: integer
          format: int32
          minimum: 1
          readOnly: true
          description: Server-managed counter incremented only when an update sets breakingChange to true. Snapshotted on every CalculationRecord so confirmed calculations remain reconstructable after later rule edits.
          example: 1
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'
      x-businessRules:
      - module, ruleType, component, and scope are immutable after creation — delete and re-create the rule to change any of them.
      - 'Attribute-path registration: the first active rule (in any module) to reference a given attribute name registers its `jsonPath` for (module, attributeName). Any later rule using the same name with a different `jsonPath` is rejected with `409 AttributePath.Conflict`. This applies to `conditions` keys, `formulaVariables` keys, `sourceAttribute`, `appliesOn`, and to `subEntityPath` grouped by shared `component`.'
      - subEntityPath is required and must be a JSONPath ending in an array/wildcard segment when scope = SUBENTITY; must be absent when scope = ENTITY.
      - value is required and non-null when calculationType is FLAT, PERCENTAGE, or PER_UNIT.
      - appliesOn.jsonPath is required when calculationType is PER_UNIT or SLAB; appliesOn.componentRef is required when calculationType is PERCENTAGE or ruleType is ADJUSTMENT.
      - slabs must contain at least one tier, sorted and non-overlapping, when calculationType = SLAB.
      - 'formulaLogic and formulaVariables are both required when calculationType = FORMULA; every var reference (e.g. {"var": "x"}) in formulaLogic must have a matching key in formulaVariables.'
      - aggregateFunction, sourceAttribute, and targetAttribute are all required, and scope must be SUBENTITY, when ruleType = AGGREGATION.
      - dependsOn must not introduce a cycle across all active rules for a module — the resulting component graph must be a DAG.
      - effectiveFrom must be strictly before effectiveTo when effectiveTo is provided; no two active rules for the same (tenantId, module, component) may have overlapping conditions and overlapping effective date ranges.
      - When multiple RATE_MATRIX rules could match the same context, the engine selects the most specific match — the rule with the fewest wildcarded condition keys wins.
      - ADJUSTMENT rules are cumulative and applied in ascending priority order; RATE_MATRIX rules are expected to be mutually exclusive per entity/sub-entity.
      - AGGREGATION rules are always evaluated before any rule that lists their `component` in `dependsOn`, regardless of `priority`.
    CalculationRuleUpdateRequest:
      allOf:
      - $ref: '#/components/schemas/CalculationRule'
      - type: object
        required:
        - version
        properties:
          version:
            type: integer
            description: Current version for optimistic concurrency check. Update is rejected with 409 if this does not match the stored version.
          breakingChange:
            type: boolean
            default: false
            description: Set true when this update changes computed amounts (value, slabs, formulaLogic, conditions) so that `configVersion` is bumped. Leave false for cosmetic edits.
      description: Partial update payload for PUT on a single calculation rule. Include only the fields you want to change — omitted fields keep their current stored values. module, ruleType, component, and scope cannot be changed via this payload; delete and re-create the rule if any of those need to change.
      x-businessRules:
      - version must match the rule's current stored version exactly, or the update is rejected with 409 (stale version — someone else edited this rule since you read it).
      - breakingChange defaults to false; set it to true whenever value, slabs, formulaLogic, or conditions change in a way that would alter previously computed amounts, so configVersion increments and existing CalculationRecords remain traceable to the exact rule version that produced them.
    AttributePathRegistryEntry:
      type: object
      properties:
        attributeName:
          type: string
          example: employeeCount
          description: The canonical name rules reference in their conditions and formulaVariables keys — not necessarily the raw payload's own field name, just whatever name the first rule that used it chose to call it.
        jsonPath:
          type: string
          nullable: true
          description: Null when source = DERIVED (value comes from an AGGREGATION component rather than the raw payload).
          example: $.tradeLicenseDetail.employeeCount
        scope:
          $ref: '#/components/schemas/Scope'
        source:
          type: string
          enum:
          - RAW_PAYLOAD
          - DERIVED
          description: RAW_PAYLOAD if resolved via jsonPath against entityDetail; DERIVED if produced by an AGGREGATION rule.
          example: RAW_PAYLOAD
        derivedFromComponent:
          type: string
          nullable: true
          description: Set when source = DERIVED — the AGGREGATION component that produces this attribute.
          example: TOTAL_ACCESSORY_COUNT
        registeredByRuleId:
          type: string
          format: uuid
          description: The rule that first registered this name/path pair.
          example: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
      description: One entry in the (attributeName → jsonPath) registry for a module — shows where a canonical attribute name currently resolves, and whether it comes straight from the raw payload or is derived by an AGGREGATION rule.
      x-businessRules:
      - jsonPath is null when source = DERIVED — in that case derivedFromComponent names the AGGREGATION rule that produces the value instead.
    AttributePathRegistry:
      type: object
      properties:
        module:
          type: string
          description: The module this registry belongs to.
          example: trade-license
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AttributePathRegistryEntry'
          description: Every attribute name any active rule has registered for this module so far.
          example:
          - attributeName: employeeCount
            jsonPath: $.certificateDetail.employeeCount
            scope: ENTITY
            source: RAW_PAYLOAD
            registeredByRuleId: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
      description: Response wrapper for the attribute-path registry lookup — the full (attributeName → jsonPath) mapping currently active for one module, built lazily from whichever rules have been written so far.
      x-businessRules:
      - This registry is read-only and derived — there is no direct write endpoint for it. Entries appear the moment the first active rule for this module references that attribute name, and disappear once no active rule references it anymore.
    LineItem:
      type: object
      description: A single computed component of the breakup, corresponding to one matched or evaluated CalculationRule.
      properties:
        component:
          type: string
          example: ACCESSORY_REGISTRATION_FEE
          description: The component code this line item represents — matches the component of the CalculationRule that produced it.
        ruleType:
          $ref: '#/components/schemas/RuleType'
