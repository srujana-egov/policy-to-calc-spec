openapi: 3.0.3
info:
  title: Calculation Engine API
  version: 3.0.0
  description: 'REST APIs for generic tax and fee calculation across government modules (Property Tax, Trade License, Water Connection, Sewerage Connection, Building Permission, etc.).


    ## Design summary


    The engine never assumes a fixed payload shape. `/estimate` and `/confirm` accept the caller''s raw domain JSON as-is (`entityDetail`), whatever hierarchy it happens to be in. Every `CalculationRule` declares, inline, the JSONPath of only the attribute(s) it actually needs — there is no separate upfront entity-mapping resource to author, and no requirement to describe fields nobody uses.


    To prevent silent drift (two rules quietly pointing at two different paths for what is supposed to be the same attribute), the engine lazily builds a per-module (attributeName → jsonPath) registry from whichever rule first references that name, and rejects, at write time (`409`), any later rule that reuses the same attribute name with a different path. Drift becomes a loud rejection when a rule is authored, never a silent missing line item at calculation time.


    Sub-units of an entity (floors of a property, accessory items of a license, taps of a connection) are addressed the same way — a rule with `scope: SUBENTITY` declares the `subEntityPath` (a JSONPath resolving to the repeating array in the caller''s payload) once; every other rule sharing that `component` prefix must resolve to the same array, enforced by the same registry mechanism.


    Rule types (`RATE_MATRIX`, `ADJUSTMENT`, `PENALTY`, `INTEREST`, `TAX`, `AGGREGATION`) and calculation types (`FLAT`, `PERCENTAGE`, `PER_UNIT`, `SLAB`, `FORMULA`) are data, not code — the engine has no hardcoded knowledge of any module''s vocabulary (floor, employee count, accessory type, pipe size — all just attribute names declared by rules).


    FORMULA rules are evaluated as JSON Logic (see https://jsonlogic.com) — declarative, JSON-native, no custom parser, safe against injection. AGGREGATION rules derive an entity-level attribute (e.g. total accessory count) from a sum/count/max/min/avg over a sub-entity array, so downstream RATE_MATRIX/ADJUSTMENT rules can band on the derived total exactly as if it had been sent directly.


    ## What this service does NOT own

    - Demands, bills, payments, or receipts — forward `CalculationRecord.lineItems` to the billing service.

    - Workflow/process state machines.

    - Validation of the caller''s domain object schema — the engine only reads the paths its rules declare; it does not validate the rest of the payload.


    ## Config versioning

    Each `CalculationRule` carries two counters: `version` (bumped on every PUT, optimistic concurrency) and `configVersion` (bumped only when `breakingChange: true` is set — i.e. the rule''s amount/logic changed in a way that would alter results). `CalculationRecord` snapshots the `configVersion` and resolved `jsonPath` of every rule and attribute actually used, so an old, confirmed calculation can always be reconstructed exactly as computed, even after rules and payload shapes have since moved on.


    ## Tenant isolation

    `tenantId` is always resolved from the Bearer token and must not be sent in request bodies.

    '
servers:
- url: https://api.example.com/calculation/v3
  description: Production server
- url: https://staging-api.example.com/calculation/v3
  description: Staging server
security:
- BearerAuth: []
tags:
- name: Config
  description: Manage per-tenant, per-module calculation rules (rate matrix, adjustment/rebate, penalty, interest, tax, and aggregation).
- name: Calculation
  description: Estimate, recalculate, confirm, and cancel tax/fee calculations against the caller's raw entity JSON.
paths:
  /{module}/rules:
    post:
      summary: Create a calculation rule
      operationId: createCalculationRule
      tags:
      - Config
      description: 'Creates a new calculation rule for a module + component under the calling tenant.


        Each condition and formula variable declares its own `jsonPath` inline — only the attributes this rule actually needs. No separate entity-mapping resource is required.


        **Path registration check (runs on every create/update):** for every attribute name referenced in `conditions` or `formulaVariables`, and for `subEntityPath` when `scope = SUBENTITY`, the engine checks whether that name is already registered for this module with a different path.

        - First rule to use a name registers its `jsonPath` for (module, attributeName).

        - Any later rule reusing that name with a **different** `jsonPath` is rejected with `409 AttributePath.Conflict`, naming the already-registered path.

        - Reusing the name with the **same** `jsonPath` succeeds normally.


        Returns `409 Rule.AlreadyExists` if an active rule already exists for the same (tenantId, module, component, conditions, effectiveFrom) combination — use PUT to update, or a new `effectiveFrom` to version it.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/ModulePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRule'
            examples:
              rateMatrixEntityLevel:
                summary: 'Trade license: staffing fee banded on employee count (entity-level, path registered here)'
                value:
                  ruleType: RATE_MATRIX
                  component: STAFFING_FEE
                  scope: ENTITY
                  conditions:
                    employeeCount:
                      jsonPath: $.tradeLicenseDetail.employeeCount
                      from: 10
                      to: 24
                  calculationType: FLAT
                  value: 1200
                  priority: 10
                  effectiveFrom: '2024-04-01'
              rateMatrixSubEntity:
                summary: 'Trade license: per-accessory-type fee (sub-entity scope, iterates the accessories array)'
                value:
                  ruleType: RATE_MATRIX
                  component: ACCESSORY_REGISTRATION_FEE
                  scope: SUBENTITY
                  subEntityPath: $.tradeLicenseDetail.accessories[*]
                  conditions:
                    accessoryType:
                      jsonPath: type
                      equals: WEIGHING_SCALE
                  calculationType: PER_UNIT
                  appliesOn:
                    jsonPath: quantity
                  value: 200
                  priority: 10
                  effectiveFrom: '2024-04-01'
              aggregation:
                summary: 'Trade license: derive total accessory count from the accessories array'
                value:
                  ruleType: AGGREGATION
                  component: TOTAL_ACCESSORY_COUNT
                  scope: SUBENTITY
                  subEntityPath: $.tradeLicenseDetail.accessories[*]
                  aggregateFunction: SUM
                  sourceAttribute:
                    jsonPath: quantity
                  targetAttribute: numberOfAccessories
                  priority: 1
                  effectiveFrom: '2024-04-01'
              bulkSurchargeOnDerivedTotal:
                summary: Surcharge banded on the derived numberOfAccessories (registered by the aggregation rule above, reused here with the same canonical name — no jsonPath needed, it is not a raw-payload field)
                value:
                  ruleType: ADJUSTMENT
                  component: BULK_ACCESSORY_SURCHARGE
                  scope: ENTITY
                  conditions:
                    numberOfAccessories:
                      derivedFrom: TOTAL_ACCESSORY_COUNT
                      from: 4
                  calculationType: FLAT
                  value: 300
                  appliesOn:
                    componentRef: LICENSE_FEE
                  dependsOn:
                  - TOTAL_ACCESSORY_COUNT
                  priority: 40
                  effectiveFrom: '2024-04-01'
              formulaPremisesFee:
                summary: Formula fee using JSON Logic over two declared variables
                value:
                  ruleType: RATE_MATRIX
                  component: PREMISES_SIZE_FEE
                  scope: ENTITY
                  conditions: {}
                  calculationType: FORMULA
                  formulaVariables:
                    sizeOfPremiseSqm:
                      jsonPath: $.tradeLicenseDetail.premises.sizeSqm
                  formulaLogic:
                    +:
                    - 200
                    - '*':
                      - var: sizeOfPremiseSqm
                      - 15
                  priority: 20
                  effectiveFrom: '2024-04-01'
      responses:
        '201':
          description: Calculation rule created.
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            X-Response-Timestamp:
              $ref: '#/components/headers/X-Response-Timestamp'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            X-Tenant-ID:
              $ref: '#/components/headers/X-Tenant-ID'
            X-Rate-Limit:
              $ref: '#/components/headers/X-Rate-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationRule'
              examples:
                created:
                  summary: STAFFING_FEE rule created
                  value:
                    id: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
                    module: trade-license
                    ruleType: RATE_MATRIX
                    component: STAFFING_FEE
                    scope: ENTITY
                    conditions:
                      employeeCount:
                        jsonPath: $.certificateDetail.employeeCount
                        from: 10
                        to: 24
                    calculationType: FLAT
                    value: 1200
                    priority: 10
                    roundOff: NEAREST_1
                    isActive: true
                    effectiveFrom: '2024-04-01'
                    version: 1
                    configVersion: 1
                    auditDetail:
                      createdBy: user-uuid-123
                      createdTime: 1751260000000
                      lastModifiedBy: user-uuid-123
                      lastModifiedTime: 1751260000000
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                validation:
                  value:
                  - code: Validation.Error
                    message: calculationType is FLAT but 'value' is missing.
        '409':
          description: Either `Rule.AlreadyExists` (an active rule already matches this component/conditions/date), or `AttributePath.Conflict` (an attribute or subEntityPath name is already registered for this module with a different JSONPath).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                pathConflict:
                  summary: Attribute already mapped to a different path
                  value:
                  - code: AttributePath.Conflict
                    message: '''employeeCount'' is already registered for module ''TradeLicense'' with jsonPath ''$.tradeLicenseDetail.employeeCount''. This rule declared ''$.tradeLicenseDetail.staffCount''. Use the registered path, or update all rules referencing this attribute together.'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred. Retry with the same Idempotency-Key.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
    get:
      summary: Search calculation rules
      operationId: searchCalculationRules
      tags:
      - Config
      description: 'Returns calculation rules for the calling tenant, optionally filtered by module, component, ruleType, and an as-on date.

        If `asOnDate` is provided, only the rule version effective on that date is returned per (module, component, conditions) combination.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - name: component
        in: query
        required: false
        schema:
          type: string
        description: The component code to filter by, e.g. STAFFING_FEE, ACCESSORY_REGISTRATION_FEE, CGST, PENALTY.
      - name: ruleType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/RuleType'
        description: Filter by rule category.
      - name: asOnDate
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Return only the rule version effective on this date. Defaults to today if omitted.
      - $ref: '#/components/parameters/ModulePath'
      responses:
        '200':
          description: Calculation rules returned.
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            X-Response-Timestamp:
              $ref: '#/components/headers/X-Response-Timestamp'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            X-Tenant-ID:
              $ref: '#/components/headers/X-Tenant-ID'
            X-Rate-Limit:
              $ref: '#/components/headers/X-Rate-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalculationRule'
              examples:
                twoRules:
                  summary: Two active rules for trade-license
                  value:
                  - id: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
                    module: trade-license
                    ruleType: RATE_MATRIX
                    component: STAFFING_FEE
                    scope: ENTITY
                    conditions:
                      employeeCount:
                        jsonPath: $.certificateDetail.employeeCount
                        from: 10
                        to: 24
                    calculationType: FLAT
                    value: 1200
                    priority: 10
                    roundOff: NEAREST_1
                    isActive: true
                    effectiveFrom: '2024-04-01'
                    version: 1
                    configVersion: 1
                    auditDetail:
                      createdBy: user-uuid-123
                      createdTime: 1751260000000
                      lastModifiedBy: user-uuid-123
                      lastModifiedTime: 1751260000000
                  - id: c3d4e5f6-3333-4444-5555-666677778888
                    module: trade-license
                    ruleType: TAX
                    component: CGST
                    scope: ENTITY
                    conditions: {}
                    calculationType: PERCENTAGE
                    value: 9
                    appliesOn:
                      componentRef: STAFFING_FEE
                    dependsOn:
                    - STAFFING_FEE
                    priority: 20
                    roundOff: NEAREST_1
                    isActive: true
                    effectiveFrom: '2024-04-01'
                    version: 1
                    configVersion: 1
                    auditDetail:
                      createdBy: user-uuid-123
                      createdTime: 1751260000000
                      lastModifiedBy: user-uuid-123
                      lastModifiedTime: 1751260000000
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                badRequest:
                  value:
                  - code: Validation.Error
                    message: asOnDate must be a valid ISO date.
        '404':
          description: No rules found for the given filters.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                  - code: Rule.NotFound
                    message: No rules found for module 'trade-license' with the given filters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
  /{module}/rules/{id}:
    put:
      summary: Update a calculation rule
      operationId: updateCalculationRule
      tags:
      - Config
      description: 'Updates an existing calculation rule identified by `id`, under the calling tenant.

        Only include fields you want to change — omitted fields retain their current values.

        `module`, `ruleType`, and `component` are immutable — delete and re-create the rule to change them.

        The same attribute-path registration check described on POST runs on every update.

        Returns `404` if no rule exists with the given `id`.

        Set `breakingChange: true` to bump `configVersion` — use whenever `value`, `slabs`, `formulaLogic`, or `conditions` change in a way that would alter previously computed amounts.

        On success, the rule cache for this tenant+module is immediately invalidated.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/ModulePath'
      - $ref: '#/components/parameters/RuleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRuleUpdateRequest'
            example:
              version: 1
              breakingChange: true
              value: 2.5
              effectiveFrom: '2025-04-01'
      responses:
        '200':
          description: Calculation rule updated.
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            X-Response-Timestamp:
              $ref: '#/components/headers/X-Response-Timestamp'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            X-Tenant-ID:
              $ref: '#/components/headers/X-Tenant-ID'
            X-Rate-Limit:
              $ref: '#/components/headers/X-Rate-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationRule'
              examples:
                updated:
                  summary: STAFFING_FEE amount increased, breakingChange
                  value:
                    id: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
                    module: trade-license
                    ruleType: RATE_MATRIX
                    component: STAFFING_FEE
                    scope: ENTITY
                    conditions:
                      employeeCount:
                        jsonPath: $.certificateDetail.employeeCount
                        from: 10
                        to: 24
                    calculationType: FLAT
                    value: 1500
                    priority: 10
                    roundOff: NEAREST_1
                    isActive: true
                    effectiveFrom: '2024-04-01'
                    version: 2
                    configVersion: 2
                    auditDetail:
                      createdBy: user-uuid-123
                      createdTime: 1751260000000
                      lastModifiedBy: user-uuid-123
                      lastModifiedTime: 1751260000000
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                validation:
                  value:
                  - code: Validation.Error
                    message: value must be a positive number for calculationType FLAT.
        '404':
          description: No rule found with the given id.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                  - code: Rule.NotFound
                    message: No rule found with the given id.
        '409':
          description: Conflict — immutable field change attempted (module, ruleType, or component), a stale `version` was supplied, or an `AttributePath.Conflict` was detected.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                staleVersion:
                  value:
                  - code: Rule.VersionConflict
                    message: Provided version 1 does not match current version 2. Fetch the latest and retry.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
    delete:
      summary: Delete a calculation rule
      operationId: deleteCalculationRule
      tags:
      - Config
      description: 'Deletes the calculation rule identified by `id`, under the calling tenant.

        Deleting a rule does not affect calculations already confirmed under it — confirmed calculations always reference the rule `configVersion` active at confirmation time.

        Does NOT deregister the attribute path this rule contributed — the (module, attributeName) → jsonPath registry entry persists as long as any other active rule still references that name, and is only released once no rule references it.

        Idempotent — returns `200` even if no rule existed with the given id.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - $ref: '#/components/parameters/ModulePath'
      - $ref: '#/components/parameters/RuleIdPath'
      responses:
        '200':
          description: Rule deleted or did not exist.
          headers:
            X-Response-Time:
              $ref: '#/components/headers/X-Response-Time'
            X-Response-Timestamp:
              $ref: '#/components/headers/X-Response-Timestamp'
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            X-Tenant-ID:
              $ref: '#/components/headers/X-Tenant-ID'
            X-Rate-Limit:
              $ref: '#/components/headers/X-Rate-Limit'
            X-Rate-Limit-Remaining:
              $ref: '#/components/headers/X-Rate-Limit-Remaining'
            X-Rate-Limit-Reset:
              $ref: '#/components/headers/X-Rate-Limit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
              examples:
                deleted:
                  summary: Rule deleted
                  value:
                    deleted: true
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                badRequest:
                  value:
                  - code: Validation.Error
                    message: id must be a valid UUID.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  value:
                  - code: Internal.ServerError
                    message: An unexpected error occurred.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
  /{module}/rules/attribute-paths:
    get:
      summary: List registered attribute paths for a module
      operationId: listAttributePaths
      tags:
      - Config
      description: 'Returns the current (attributeName → jsonPath) registry for a module — every canonical attribute name any active rule has declared, and the single path it resolves to.

        Useful for a config-authoring UI to warn against reusing a name with a different path before the write-time `409` would otherwise catch it, and to review what a module''s rules actually read from the raw payload.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ModulePath'
      responses:
        '200':
          description: Registered attribute paths.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributePathRegistry'
              example:
                module: TradeLicense
                entries:
                - attributeName: employeeCount
                  jsonPath: $.tradeLicenseDetail.employeeCount
                  scope: ENTITY
                  source: RAW_PAYLOAD
                  registeredByRuleId: 8a2c4a74-11e5-4c3e-9d9f-f7f4c0b1b9a3
                - attributeName: numberOfAccessories
                  jsonPath: null
                  scope: ENTITY
                  source: DERIVED
                  derivedFromComponent: TOTAL_ACCESSORY_COUNT
                  registeredByRuleId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                - attributeName: accessories[*]
                  jsonPath: $.tradeLicenseDetail.accessories[*]
                  scope: SUBENTITY
                  source: RAW_PAYLOAD
                  registeredByRuleId: 4ab96f75-6828-5673-c4gd-3d074g77bgb7
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                badRequest:
                  value:
                  - code: Validation.Error
                    message: module path segment is required.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                  - code: Unauthorized
                    message: Missing or invalid bearer token.
  /{module}/calculations:
    get:
      summary: Search calculation records for an entity
      operationId: searchCalculationRecords
      tags:
      - Calculation
