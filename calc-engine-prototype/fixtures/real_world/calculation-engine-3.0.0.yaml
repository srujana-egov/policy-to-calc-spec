  /{module}/estimate:
    post:
      summary: Estimate tax/fee for a raw entity payload
      operationId: estimateCalculation
      tags:
      - Calculation
      description: 'Computes a full tax/fee breakup directly against `entityDetail` — the caller''s own domain JSON, in whatever shape it naturally exists. The engine does not require `entityDetail` to conform to any fixed schema; it only reads the specific JSONPaths that this module''s active rules declare.


        Evaluation flow:

        1. Run all `AGGREGATION` rules first — resolve each `subEntityPath`, apply `aggregateFunction` over `sourceAttribute`, and inject the result into the entity context under `targetAttribute`.

        2. Run `RATE_MATRIX` rules — for `scope: SUBENTITY` rules, resolve `subEntityPath` and evaluate once per array element; for `scope: ENTITY` rules, evaluate once against the root payload plus any derived attributes from step 1.

        3. Apply `ADJUSTMENT` rules in ascending `priority` order.

        4. Evaluate remaining `PENALTY`, `INTEREST`, `TAX` components in `dependsOn` topological order, using `asOnDate` for time-based components.

        5. Round each line item per its rule''s `roundOff`.


        Returns a UUID `calculationId`. This is a stateless preview by default — nothing is persisted as a payable demand until `/confirm` is called.

        '
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/UserAgentHeader'
      - $ref: '#/components/parameters/TenantIdHeader'
      - $ref: '#/components/parameters/ForwardedForHeader'
      - $ref: '#/components/parameters/ClientId'
      - $ref: '#/components/parameters/ClientSecret'
      - $ref: '#/components/parameters/TimeStamp'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/ModulePath'
