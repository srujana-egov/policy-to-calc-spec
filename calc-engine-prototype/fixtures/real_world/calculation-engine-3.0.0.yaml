          description: New date to recalculate time-based components against. Defaults to today if omitted.
        entityDetail:
          type: object
          additionalProperties: true
          description: Full replacement payload, if it has changed since the original estimate. If omitted, the previous payload is reused.
      description: Request payload to recompute an existing, unconfirmed estimate — used when time has passed and PENALTY/INTEREST need fresh values, or when entityDetail has changed.
