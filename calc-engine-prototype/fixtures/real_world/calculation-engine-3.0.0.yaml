      - entityId is required on every /estimate call and is immutable for the lifetime of the resulting calculationId — /recalculate cannot change it.
      - entityId is caller-defined and opaque to the engine — it is never matched against, never used in any rule condition, purely a foreign key for billing and CalculationRecord search.
